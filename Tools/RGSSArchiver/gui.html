<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RGSSArchiver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script>
    tailwind.config = { theme: { extend: {
        fontFamily: { mono: ['"Cascadia Code"','"Fira Code"','Consolas','ui-monospace','monospace'] }
    }}}
    </script>
    <style>
    body { background: #020617; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    input[type="checkbox"] { appearance:none; width:1rem; height:1rem; background:#1e293b; border:1.5px solid #475569;
        border-radius:4px; cursor:pointer; position:relative; flex-shrink:0; }
    input[type="checkbox"]:checked { background:#8b5cf6; border-color:#8b5cf6; }
    input[type="checkbox"]:checked::after { content:"\2713"; color:#fff; position:absolute; font-size:11px;
        top:50%; left:50%; transform:translate(-50%,-50%); font-weight:bold; }
    input[type="checkbox"]:focus { outline:2px solid rgba(139,92,246,0.4); outline-offset:1px; }
    </style>
</head>
<body class="h-full bg-slate-950 text-slate-200 flex flex-col overflow-hidden select-none" x-data="app()">

    <!-- Header -->
    <header class="flex items-center justify-between px-5 py-2.5 bg-slate-900/80 border-b border-slate-800/80 backdrop-blur flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-purple-700 flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0l-3-3m3 3l3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
                </svg>
            </div>
            <span class="text-sm font-semibold tracking-tight">RGSSArchiver</span>
            <span class="text-[10px] text-slate-500 bg-slate-800/80 px-1.5 py-0.5 rounded font-mono">1.0.0</span>
        </div>
        <span class="text-[11px] text-slate-500 hidden sm:block">Universal RGSSAD v1 Archive Tool &mdash; RPG Maker XP / mkxp-z</span>
    </header>

    <div class="flex flex-1 overflow-hidden">

        <!-- Sidebar -->
        <nav class="w-52 bg-slate-900/30 border-r border-slate-800/60 py-3 px-2 flex flex-col gap-0.5 overflow-y-auto flex-shrink-0">
            <p class="text-[9px] font-bold uppercase tracking-[0.15em] text-slate-600 px-3 pt-1 pb-2">Commands</p>
            <template x-for="c in commands" :key="c.id">
                <button @click="command = c.id"
                    :class="command === c.id
                        ? 'bg-violet-500/15 text-violet-300 border-l-violet-500'
                        : 'text-slate-400 border-l-transparent hover:bg-slate-800/50 hover:text-slate-200'"
                    class="flex items-center gap-2.5 px-3 py-[7px] rounded-r-lg text-[13px] font-medium transition-all duration-150 border-l-2 text-left w-full">
                    <span x-text="c.icon" class="text-sm w-5 text-center"></span>
                    <span x-text="c.label" class="truncate"></span>
                </button>
            </template>
            <div class="flex-1"></div>
            <div class="text-[10px] text-slate-600 px-3 pt-3 mt-2 border-t border-slate-800/50 leading-relaxed">
                For RPG Maker XP<br>and mkxp-z projects
            </div>
        </nav>

        <!-- Main content -->
        <div class="flex-1 flex flex-col min-w-0">

            <!-- Form area -->
            <div class="flex-1 overflow-y-auto">
                <div class="max-w-xl mx-auto px-6 py-6">
                    <div class="mb-6">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <span x-text="currentCmd.icon"></span>
                            <span x-text="currentCmd.label"></span>
                        </h2>
                        <p class="text-sm text-slate-400 mt-1" x-text="currentCmd.desc"></p>
                    </div>

                    <!-- Dynamic fields -->
                    <div class="space-y-4">
                        <template x-for="field in currentFields" :key="field.key">
                            <div>
                                <div x-show="field.type !== 'checkbox'">
                                    <label class="block text-[11px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wide" x-text="field.label"></label>
                                    <div class="flex gap-2">
                                        <input :type="field.type === 'password' ? 'password' : 'text'"
                                            x-model="forms[command][field.key]"
                                            :placeholder="field.placeholder || ''"
                                            class="flex-1 bg-slate-800/80 border border-slate-700/80 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-violet-500/40 focus:border-violet-500/60 transition-all">
                                        <button x-show="field.browse" @click="browseFor(field)"
                                            :disabled="browsing"
                                            class="px-3 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700/80 rounded-lg text-xs text-slate-400 hover:text-slate-200 transition-all whitespace-nowrap disabled:opacity-40 disabled:cursor-wait">
                                            <span x-show="!browsing">&#128193; Browse</span>
                                            <span x-show="browsing">&#8987;</span>
                                        </button>
                                    </div>
                                    <p x-show="field.hint" class="text-[11px] text-slate-500 mt-1.5 leading-relaxed" x-text="field.hint"></p>
                                </div>
                                <label x-show="field.type === 'checkbox'" class="inline-flex items-center gap-2.5 cursor-pointer mt-1">
                                    <input type="checkbox" x-model="forms[command][field.key]">
                                    <span class="text-sm text-slate-300" x-text="field.label"></span>
                                </label>
                            </div>
                        </template>
                    </div>

                    <!-- Execute button -->
                    <button @click="execute()" :disabled="running"
                        class="mt-7 w-full py-2.5 rounded-lg font-medium text-sm transition-all duration-200 flex items-center justify-center gap-2"
                        :class="running
                            ? 'bg-slate-700/50 text-slate-500 cursor-not-allowed'
                            : 'bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white shadow-lg shadow-violet-500/20 hover:shadow-violet-500/30 active:scale-[0.98]'">
                        <svg x-show="running" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        <span x-text="running ? 'Running...' : '\u25B6  Execute'"></span>
                    </button>
                </div>
            </div>

            <!-- Output console -->
            <div class="h-56 bg-slate-950 border-t border-slate-800/80 flex flex-col flex-shrink-0">
                <div class="flex items-center justify-between px-4 py-1.5 bg-slate-900/40 border-b border-slate-800/40">
                    <div class="flex items-center gap-2.5">
                        <span class="text-[11px] font-semibold text-slate-500 uppercase tracking-wide">Output</span>
                        <span x-show="success === true" x-transition class="text-[11px] text-emerald-400 font-medium">&#10003; Done</span>
                        <span x-show="success === false" x-transition class="text-[11px] text-red-400 font-medium">&#10007; Error</span>
                    </div>
                    <button @click="output = ''; success = null" class="text-[11px] text-slate-600 hover:text-slate-400 transition-colors">Clear</button>
                </div>
                <pre x-ref="console"
                    class="flex-1 overflow-auto px-4 py-3 text-[12px] font-mono leading-relaxed whitespace-pre-wrap select-text"
                    :class="output ? 'text-slate-300' : 'text-slate-600'"
                    x-text="output || 'Ready. Select a command and click Execute.'"></pre>
            </div>
        </div>
    </div>

<script>
function app() {
    return {
        command: 'create',
        running: false,
        browsing: false,
        output: '',
        success: null,
        commands: [
            { id:'create',    icon:'\uD83D\uDCE6', label:'Create Archive',      desc:'Build an RGSSAD v1 archive from your game directory.' },
            { id:'extract',   icon:'\uD83D\uDCC2', label:'Extract Archive',     desc:'Extract all files from an RGSSAD archive to a directory.' },
            { id:'list',      icon:'\uD83D\uDCCB', label:'List Contents',       desc:'List archive contents grouped by top-level folder.' },
            { id:'verify',    icon:'\u2705',        label:'Verify Archive',      desc:'Read and verify all entries in an archive.' },
            { id:'patch-exe', icon:'\uD83D\uDD27', label:'Patch Game.exe',      desc:'Replace the encryption key in a mkxp-z Game.exe binary.' },
            { id:'protect',   icon:'\uD83D\uDD12', label:'Protect (Encrypt)',   desc:'Add AES-256-CBC encryption layer to an RGSSAD archive.' },
            { id:'unprotect', icon:'\uD83D\uDD13', label:'Unprotect (Decrypt)', desc:'Remove AES encryption from a .scd file.' },
        ],
        fieldDefs: {
            create: [
                { key:'dir',     label:'Game Directory',     type:'text', placeholder:'C:\\MyGame', browse:'folder' },
                { key:'output',  label:'Output File',        type:'text', placeholder:'Game.rgssad (auto if empty)' },
                { key:'key',     label:'Custom Key',         type:'text', placeholder:'0xB7A3C1D9', hint:'Optional \u2014 protects against standard decrypter tools' },
                { key:'verbose', label:'Verbose output (show each file)', type:'checkbox' },
            ],
            extract: [
                { key:'input',   label:'Archive File',       type:'text', placeholder:'Game.rgssad', browse:'file', filter:'RGSSAD Archives|*.rgssad|All Files|*.*' },
                { key:'output',  label:'Output Directory',   type:'text', placeholder:'Same directory as archive', browse:'folder' },
                { key:'key',     label:'Custom Key',         type:'text', placeholder:'0xB7A3C1D9', hint:'Required if archive was created with a custom key' },
                { key:'verbose', label:'Verbose output',     type:'checkbox' },
            ],
            list: [
                { key:'input', label:'Archive File', type:'text', placeholder:'Game.rgssad', browse:'file', filter:'RGSSAD Archives|*.rgssad|All Files|*.*' },
                { key:'key',   label:'Custom Key',   type:'text', placeholder:'0xB7A3C1D9', hint:'If archive uses a custom key' },
            ],
            verify: [
                { key:'input', label:'Archive File', type:'text', placeholder:'Game.rgssad', browse:'file', filter:'RGSSAD Archives|*.rgssad|All Files|*.*' },
                { key:'key',   label:'Custom Key',   type:'text', placeholder:'0xB7A3C1D9', hint:'If archive uses a custom key' },
            ],
            'patch-exe': [
                { key:'input',  label:'Game.exe Path', type:'text', placeholder:'Game.exe', browse:'file', filter:'Executables|*.exe|All Files|*.*' },
                { key:'output', label:'Output Path',    type:'text', placeholder:'Same file (in-place)', hint:'Leave empty to patch in-place' },
                { key:'key',    label:'Custom Key',     type:'text', placeholder:'0xB7A3C1D9', hint:'Required \u2014 the new encryption key to write' },
            ],
            protect: [
                { key:'input',      label:'Input Archive', type:'text',     placeholder:'Game.rgssad', browse:'file', filter:'RGSSAD Archives|*.rgssad|All Files|*.*' },
                { key:'output',     label:'Output File',   type:'text',     placeholder:'Auto: .scd extension' },
                { key:'passphrase', label:'Passphrase',    type:'password', placeholder:'Your secret passphrase', hint:'Required \u2014 used for AES-256-CBC encryption' },
            ],
            unprotect: [
                { key:'input',      label:'Input SCD File', type:'text',     placeholder:'Game.scd', browse:'file', filter:'SCD Archives|*.scd|All Files|*.*' },
                { key:'output',     label:'Output File',    type:'text',     placeholder:'Auto: .rgssad extension' },
                { key:'passphrase', label:'Passphrase',     type:'password', placeholder:'Your secret passphrase', hint:'Required \u2014 same passphrase used during encryption' },
            ],
        },
        forms: {
            create:    { dir:'', output:'', key:'', verbose:false },
            extract:   { input:'', output:'', key:'', verbose:false },
            list:      { input:'', key:'' },
            verify:    { input:'', key:'' },
            'patch-exe': { input:'', output:'', key:'' },
            protect:   { input:'', output:'', passphrase:'' },
            unprotect: { input:'', output:'', passphrase:'' },
        },

        get currentCmd()    { return this.commands.find(c => c.id === this.command); },
        get currentFields() { return this.fieldDefs[this.command] || []; },

        async browseFor(field) {
            this.browsing = true;
            const url = field.browse === 'folder'
                ? '/api/browse/folder'
                : '/api/browse/file?filter=' + encodeURIComponent(field.filter || 'All Files|*.*');
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.path) this.forms[this.command][field.key] = data.path;
            } catch(e) {}
            this.browsing = false;
        },

        buildArgs() {
            const f = this.forms[this.command];
            const args = [this.command];
            const map = { dir:'-d', input:'-i', output:'-o', key:'-k', passphrase:'-p', verbose:'-v' };
            for (const field of this.currentFields) {
                const flag = map[field.key];
                if (!flag) continue;
                if (field.type === 'checkbox') { if (f[field.key]) args.push(flag); }
                else if (f[field.key]) args.push(flag, f[field.key]);
            }
            return args;
        },

        async execute() {
            this.success = null;
            this.output = '';
            const args = this.buildArgs();
            if (args.length <= 1 && this.command !== 'create') {
                this.output = 'Please fill in the required fields.';
                this.success = false;
                return;
            }
            this.running = true;
            try {
                const res = await fetch('/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ args })
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    this.output += decoder.decode(value, { stream: true });
                    this.$nextTick(() => {
                        const el = this.$refs.console;
                        if (el) el.scrollTop = el.scrollHeight;
                    });
                }
                const m = this.output.match(/\n?---EXIT:(-?\d+)---$/);
                if (m) {
                    this.success = m[1] === '0';
                    this.output = this.output.replace(/\n?---EXIT:-?\d+---$/, '').trimEnd();
                }
            } catch(e) {
                this.output += '\nConnection error: ' + e.message;
                this.success = false;
            }
            this.running = false;
        },
    }
}
</script>
</body>
</html>
